{% extends 'base.html' %}

{% block contenido %}
<div class='row justify-content-center'>
    <div class='col-md-8 col-lg-6'>
        <div class='card shadow-sm'>
            <div class='card-body'>
                <h2 class='card-title mb-4'>Formulario de notebook</h2>
                
                <form method='post'>
                    {% csrf_token %}
                    
                    <div class='mb-3'>
                        <label for='{{ form.codigo.id_for_label }}' class='form-label'>Código</label>
                        {{ form.codigo }}
                    </div>
                    
                    <div class='mb-3'>
                        <label for='{{ form.marca.id_for_label }}' class='form-label'>Marca</label>
                        {{ form.marca }}
                    </div>
                    
                    <div class='mb-3'>
                        <label for='{{ form.modelo.id_for_label }}' class='form-label'>Modelo</label>
                        {{ form.modelo }}
                    </div>
                    
                    <div class='mb-3'>
                        <label for='{{ form.estado.id_for_label }}' class='form-label'>Estado</label>
                        {{ form.estado }}
                    </div>
                    
                    <div class='form-check mb-3'>
                        {{ form.disponible }}
                        <label for='{{ form.disponible.id_for_label }}' class='form-check-label'>
                            Disponible
                        </label>
                    </div>
                    
                    <div class='d-flex gap-2'>
                        <button type='submit' class='btn btn-success'>Guardar</button>
                        <a href='{% url "notebook_list" %}' class='btn btn-secondary'>Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
